<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>TENISN</title>
    <style>body{background:#0f0f10;color:#cfcfcf;font-family:Inter,Segoe UI,Arial;margin:0;padding:16px} button{background:#0f0f10;border:1px solid #1f1f1f;padding:8px 12px;color:#0fff8a;border-radius:6px;cursor:pointer} input{padding:6px;border-radius:6px;border:1px solid #222;background:#070707;color:#cfcfcf} .section{margin-top:12px;padding:12px;border-radius:6px;border:1px solid #1a1a1a;background:#070707}</style>
  </head>
  <body>
    <h1>TENISN</h1>
    <div id="status">Checking backend...</div>

    <div class="section">
      <strong>Hardware Probe</strong><br/>
      <button id="probeBtn">Probe Now</button>
      <button id="recommendBtn" style="margin-left:8px">Recommend Models</button>
      <button id="rerunProbeBtn" style="margin-left:8px">Re-run First-Run Probe</button>
      <pre id="probeOut" style="margin-top:12px;white-space:pre-wrap;max-height:300px;overflow:auto;
           background:#050505;padding:12px;border-radius:6px;border:1px solid #111"></pre>
    </div>

    <div class="section">
      <strong>Models</strong><br/>
      <label>Install model: </label>
      <input id="modelName" placeholder="model-name" />
      <input id="modelSource" placeholder="source (ollama/hf/local)" style="margin-left:8px" />
      <button id="installBtn" style="margin-left:8px">Install</button>
      <pre id="modelsOut" style="margin-top:12px;white-space:pre-wrap;max-height:200px;overflow:auto;background:#050505;padding:12px;border-radius:6px;border:1px solid #111"></pre>
    </div>

    <div class="section">
      <strong>Saved Settings</strong>
      <pre id="settingsOut" style="margin-top:8px;white-space:pre-wrap;max-height:200px;overflow:auto;background:#050505;padding:12px;border-radius:6px;border:1px solid #111"></pre>
    </div>

    <script>
      async function check() {
        if (window.tenisn) {
          const s = await window.tenisn.backendStatus();
          document.getElementById('status').innerText = 'Backend running: ' + s.running + ' | ready: ' + s.ready;
        } else {
          document.getElementById('status').innerText = 'Preload API not available.';
        }
      }

      async function loadSettings() {
        if (!window.tenisn) return;
        const s = await window.tenisn.getSettings();
        document.getElementById('settingsOut').innerText = s ? JSON.stringify(s, null, 2) : 'No settings yet.';
      }

      document.getElementById('probeBtn').addEventListener('click', async () => {
        document.getElementById('probeOut').innerText = 'Probing...';
        const res = await window.tenisn.probeHardware();
        if (res.ok) {
          document.getElementById('probeOut').innerText = JSON.stringify(res.data, null, 2);
        } else {
          document.getElementById('probeOut').innerText = 'Probe failed: ' + res.error;
        }
      });

      document.getElementById('recommendBtn').addEventListener('click', async () => {
        document.getElementById('modelsOut').innerText = 'Fetching recommendations...';
        const res = await window.tenisn.modelsRecommend();
        if (res.ok) {
          document.getElementById('modelsOut').innerText = JSON.stringify(res.data, null, 2);
        } else {
          document.getElementById('modelsOut').innerText = 'Recommend failed: ' + res.error;
        }
      });

      document.getElementById('installBtn').addEventListener('click', async () => {
        const name = document.getElementById('modelName').value.trim();
        const source = document.getElementById('modelSource').value.trim() || 'auto';
        if (!name) { alert('Enter model name'); return; }
        document.getElementById('modelsOut').innerText = 'Installing ' + name + '...';
        const res = await window.tenisn.modelsInstall(name, source);
        if (res.ok) {
          document.getElementById('modelsOut').innerText = JSON.stringify(res.data, null, 2);
        } else {
          document.getElementById('modelsOut').innerText = 'Install failed: ' + res.error;
        }
      });

      document.getElementById('rerunProbeBtn').addEventListener('click', async () => {
        document.getElementById('probeOut').innerText = 'Re-running probe...';
        const res = await window.tenisn.rerunProbe();
        if (res.ok) {
          document.getElementById('probeOut').innerText = JSON.stringify(res.data, null, 2);
          loadSettings();
        } else {
          document.getElementById('probeOut').innerText = 'Re-run failed: ' + (res.error || JSON.stringify(res));
        }
      });

      if (window.tenisn && window.tenisn.onSettingsUpdated) {
        window.tenisn.onSettingsUpdated((s) => {
          document.getElementById('settingsOut').innerText = JSON.stringify(s, null, 2);
        });
      }

      // Initial load
      check();
      loadSettings();
    </script>
  </body>
</html>
